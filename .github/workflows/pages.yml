name: Deploy Doxygen HTML to Pages

on:
  push:
    branches: [master]
    paths:
      - 'M2/BUILD/build/Macaulay2/docs/doxygen/html/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (html only)
        uses: actions/upload-pages-artifact@v3
        with:
          path: M2/BUILD/build/Macaulay2/docs/doxygen/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
